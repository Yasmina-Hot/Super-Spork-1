<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spork AI</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f5f5f5;display:flex;flex-direction:column;height:100%}
    .header{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(79,70,229,.15));border-bottom:1px solid #2a2a2a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:8px}
    .header h1{font-size:15px;font-weight:700}
    select{background:#1a1a1a;border:1px solid #3a3a3a;color:#f5f5f5;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer}
    .page-ctx{margin:6px 14px;padding:6px 10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;font-size:11px;color:#888;display:none;align-items:center;gap:6px}
    .page-ctx a{color:#a78bfa;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .msg{max-width:92%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;white-space:pre-wrap}
    .msg.user{background:linear-gradient(135deg,#7c3aed,#4f46e5);align-self:flex-end;border-bottom-right-radius:4px}
    .msg.assistant{background:#1a1a1a;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #2a2a2a}
    .msg.notice{background:#1e1b3a;align-self:center;border:1px solid #3d35a0;font-size:11px;color:#a78bfa;max-width:96%;text-align:center}
    .input-area{padding:10px;border-top:1px solid #2a2a2a;display:flex;gap:7px}
    textarea{flex:1;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:9px;color:#f5f5f5;padding:9px 12px;font-size:13px;resize:none;min-height:38px;max-height:110px;font-family:inherit;line-height:1.4}
    textarea:focus{outline:none;border-color:#7c3aed}
    .send{background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:9px;color:#fff;padding:9px 13px;cursor:pointer;font-size:15px;align-self:flex-end}
    .send:disabled{opacity:.4;cursor:not-allowed}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left"><span>✦</span><h1>Spork AI</h1></div>
    <div style="display:flex;gap:6px">
      <select id="agent-sel"><option value="">No agent</option></select>
      <select id="model-sel">
        <option value="openai/gpt-oss-120b:free">GPT-OSS 120B</option>
        <option value="openai/gpt-oss-20b:free">GPT-OSS 20B</option>
        <option value="google/gemini-2.0-flash">Gemini Flash</option>
      </select>
    </div>
  </div>
  <div class="page-ctx" id="page-ctx"><span>📄</span><a id="page-link" href="#" target="_blank"></a></div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Ask Spork anything…" rows="1"></textarea>
    <button class="send" id="send">➤</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
