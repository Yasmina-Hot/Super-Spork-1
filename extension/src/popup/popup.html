<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spork AI</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:300px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f5f5f5}
    .header{background:linear-gradient(135deg,#7c3aed,#4f46e5);padding:14px 18px;display:flex;align-items:center;gap:10px}
    .header h1{font-size:17px;font-weight:700}
    .status{padding:10px 18px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:8px;font-size:13px;color:#999}
    .dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0}
    .dot.on{background:#22c55e}
    .actions{padding:10px;display:flex;flex-direction:column;gap:6px}
    .btn{display:flex;align-items:center;gap:10px;padding:9px 13px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;color:#f5f5f5;font-size:13px;cursor:pointer;text-align:left}
    .btn:hover{background:#252525}
    .btn-primary{background:linear-gradient(135deg,#7c3aed,#4f46e5);border-color:transparent}
    .btn-primary:hover{opacity:.9;background:linear-gradient(135deg,#7c3aed,#4f46e5)}
    .token-section{padding:10px 18px;border-top:1px solid #2a2a2a}
    .token-section label{font-size:11px;color:#888}
    .token-section input{width:100%;padding:7px 10px;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:7px;color:#f5f5f5;font-size:12px;margin-top:5px}
    .save-btn{margin-top:7px;width:100%;padding:7px;background:#7c3aed;border:none;border-radius:7px;color:#fff;font-size:12px;cursor:pointer}
  </style>
</head>
<body>
  <div class="header"><span>✦</span><h1>Spork AI</h1></div>
  <div class="status"><div class="dot" id="dot"></div><span id="status-text">Checking…</span></div>
  <div class="actions">
    <button class="btn btn-primary" id="open-panel">⬛ Open Side Panel</button>
    <button class="btn" id="summarize">📄 Summarize this page</button>
    <button class="btn" id="screenshot">📷 Screenshot as context</button>
    <button class="btn" id="clip">📎 Clip page to Spork</button>
  </div>
  <div class="token-section">
    <label>API Token</label>
    <input type="password" id="token-input" placeholder="Paste your token…">
    <button class="save-btn" id="save-token">Save token</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
